<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidekick Chat</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="/avatars/sidekick.jpg">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <h1>Sidekick Chat</h1>
      </div>
      <div class="header-right">
        <button class="mute-btn" id="muteBtn" title="Toggle bot responses (Ctrl+Shift+M)">
          <span class="mute-icon">🔊</span>
          <span class="mute-text">Bots Active</span>
        </button>
      </div>
    </header>

    <div class="main-content">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
          <h2 class="sidebar-title">CHANNELS</h2>
          <ul class="channel-list" id="channelList">
            <!-- Channels loaded dynamically -->
          </ul>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-section">
          <h2 class="sidebar-title">BOTS ONLINE</h2>
          <ul class="bot-list" id="botList">
            <!-- Bots loaded dynamically -->
          </ul>
        </div>
      </aside>

      <!-- Chat Area -->
      <main class="chat-area">
        <div class="channel-header" id="channelHeader">
          <span class="channel-name">#general</span>
          <button class="members-btn" id="membersBtn" title="Channel members">👥 Members</button>
        </div>
        
        <!-- Channel Members Panel -->
        <div class="members-panel" id="membersPanel">
          <div class="members-panel-header">
            <span>Channel Members</span>
            <button class="members-close" onclick="closeMembersPanel()">×</button>
          </div>
          <div class="members-list" id="membersList"></div>
          <div class="members-add">
            <select id="addMemberSelect">
              <option value="">Add bot to channel...</option>
            </select>
            <button onclick="addMemberToChannel()">Add</button>
          </div>
        </div>

        <div class="messages" id="messages">
          <!-- Messages inserted here -->
        </div>

        <div class="input-area">
          <div class="input-wrapper">
            <textarea 
              id="messageInput" 
              placeholder="Type a message..." 
              rows="1"
              autocomplete="off"
            ></textarea>
            <div class="mention-popup" id="mentionPopup">
              <!-- Mention suggestions -->
            </div>
          </div>
          <button id="sendBtn" title="Send message">Send</button>
        </div>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
